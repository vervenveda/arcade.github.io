<title>Sovereign Arts Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0d1b2a;
    --text-light: #f5f3f0;
    --accent1: #f78da7;
    --accent2: #00c9a7;
    --accent3: #f9ca24;
    --accent4: #9b59b6;
  }

  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0d1b2a, #1b263b);
    color: var(--text-light);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    text-align: center;
    max-width: 600px;
    padding: 2rem;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 1.5rem;
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    animation: fadeIn 1.5s ease;
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    letter-spacing: 2px;
  }

  p {
    font-size: 1rem;
    opacity: 0.85;
  }

  button {
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3), var(--accent4));
    background-size: 400% 400%;
    border: none;
    color: #fff;
    font-size: 1.2rem;
    padding: 0.75rem 2rem;
    border-radius: 50px;
    margin-top: 1.5rem;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: gradientShift 6s ease infinite;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px var(--accent2);
  }

  .question {
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
  }

  .options {
    display: grid;
    gap: 1rem;
  }

  .option-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text-light);
    font-size: 1rem;
    padding: 0.75rem;
    border-radius: 0.75rem;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
  }

  .option-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-2px);
  }

  .feedback {
    margin-top: 1rem;
    font-weight: 600;
    min-height: 1.5rem;
  }

  .score {
    margin-top: 1.5rem;
    font-size: 1.1rem;
    opacity: 0.9;
  }

  .footer {
    position: absolute;
    bottom: 15px;
    width: 100%;
    text-align: center;
    font-size: 0.8rem;
    opacity: 0.7;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
</style>
</head>

<div class="container" id="gameContainer">

  <p>Test your artistic intuition — from color psychology to classic masterpieces.</p>

let currentQuestion = 0;
let score = 0;

const container = document.getElementById("gameContainer");
const startBtn = document.getElementById("startBtn");

startBtn.addEventListener("click", startGame);

function startGame() {
  currentQuestion = 0;
  score = 0;
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  container.innerHTML = `
    <div class="question">${q.question}</div>
    <div class="options">
      ${q.options.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="score">Score: ${score}</div>
  `;
}

function checkAnswer(selected) {
  const feedback = document.getElementById("feedback");
  if (selected === questions[currentQuestion].answer) {
    score++;
    feedback.textContent = "✅ Correct!";
    feedback.style.color = "#00c9a7";
  } else {
    feedback.textContent = "❌ Try Again!";
    feedback.style.color = "#f78da7";
    return;
  }

  currentQuestion++;
  if (currentQuestion < questions.length) {
    setTimeout(showQuestion, 1000);
  } else {
    setTimeout(endGame, 1000);
  }
}

function endGame() {
  container.innerHTML = `
    <h1>Well Done, Artist!</h1>
    <p>You scored ${score} out of ${questions.length}.</p>
    <p>Your artistic intuition shines through every answer.</p>
    <button onclick="startGame()">🎨 Play Again</button>
  `;
}
</script>
