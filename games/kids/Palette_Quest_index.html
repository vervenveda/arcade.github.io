<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Palette Quest — Kids Color Game</title>
<style>
  :root{
    --bg:#fff7f0;
    --card:#ffffff;
    --text:#17202a;
    --muted:#6b7280;
    --accent:#ff8a65;
    --accent2:#66bb6a;
    --gold:#facc15;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    background:linear-gradient(180deg,#fff7f0,#eefdf3);
    color:var(--text);
    overflow-x:hidden;
  }

  body{
    display:flex;
    justify-content:center;
    padding:14px 0;
  }

  .app{
    width:100%;
    max-width:300px;
    padding:0 8px;
  }

  header{
    text-align:center;
    margin-bottom:8px;
  }

  h1{
    margin:0;
    font-size:22px;
    color:var(--accent);
  }

  .tagline{
    font-size:12px;
    color:var(--muted);
  }

  .card{
    background:var(--card);
    border-radius:18px;
    padding:12px;
    margin-top:10px;
    box-shadow:0 12px 28px rgba(0,0,0,.08);
  }

  .score-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:var(--muted);
  }

  .pill{
    background:#fff7d6;
    border:1px solid #fde68a;
    color:#92400e;
    border-radius:999px;
    padding:3px 8px;
    font-weight:700;
  }

  .target{
    text-align:center;
  }

  .target-circle{
    width:86px;
    height:86px;
    border-radius:999px;
    margin:8px auto;
    border:5px solid #fff;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
  }

  .target h2{
    font-size:17px;
    margin:4px 0;
  }

  .target p{
    font-size:13px;
    margin:0;
    color:var(--muted);
  }

  .palette{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-top:10px;
  }

  .color-btn{
    border:0;
    border-radius:16px;
    min-height:58px;
    cursor:pointer;
    color:#111827;
    font-weight:800;
    font-size:12px;
    box-shadow:0 5px 12px rgba(0,0,0,.15);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  .color-btn span{
    font-size:22px;
    line-height:1;
  }

  .color-btn.selected{
    outline:4px solid var(--gold);
    transform:scale(.98);
  }

  .mix-zone{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-top:10px;
  }

  .slot{
    width:54px;
    height:54px;
    border-radius:16px;
    border:2px dashed #d1d5db;
    background:#f9fafb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
  }

  .plus{
    font-weight:900;
    color:var(--muted);
  }

  .buttons{
    display:flex;
    gap:6px;
    margin-top:10px;
  }

  button.action{
    flex:1;
    border:0;
    border-radius:999px;
    padding:9px 10px;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    color:white;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }

  button.secondary{
    background:#ffffff;
    color:var(--muted);
    border:1px solid #e5e7eb;
  }

  .message{
    min-height:42px;
    margin-top:8px;
    padding:8px;
    border-radius:14px;
    background:#f9fafb;
    font-size:13px;
    text-align:center;
    color:#374151;
  }

  .stickers{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
    font-size:22px;
    min-height:32px;
  }

  .footer{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    margin-top:8px;
  }
</style>
</head>

<body>
<div class="app">
  <header>
    <h1>Palette Quest 🎨</h1>
    <div class="tagline">Mix colors, earn stars, unlock stickers.</div>
  </header>

  <section class="card">
    <div class="score-row">
      <span>Score: <strong id="score">0</strong></span>
      <span class="pill">Best: <span id="bestScore">0</span></span>
    </div>

    <div class="target">
      <div class="target-circle" id="targetCircle"></div>
      <h2 id="targetName">Make Green</h2>
      <p>Choose two paint colors, then tap Mix!</p>
    </div>

    <div class="palette" id="palette"></div>

    <div class="mix-zone">
      <div class="slot" id="slot1">?</div>
      <div class="plus">+</div>
      <div class="slot" id="slot2">?</div>
    </div>

    <div class="buttons">
      <button class="action" id="mixBtn">Mix!</button>
      <button class="action secondary" id="clearBtn">Clear</button>
    </div>

    <div class="message" id="message">
      Pick two colors to begin.
    </div>
  </section>

  <section class="card">
    <div class="score-row">
      <span>Sticker Gallery</span>
      <span>⭐ every 3 correct</span>
    </div>
    <div class="stickers" id="stickers"></div>
  </section>

  <div class="footer">
    Runs in your browser only. No ads, no tracking, no data collection.
  </div>
</div>

<script>
(function(){
  const COLORS = [
    {id:'red',    name:'Red',    emoji:'🔴', hex:'#ef4444'},
    {id:'blue',   name:'Blue',   emoji:'🔵', hex:'#3b82f6'},
    {id:'yellow', name:'Yellow', emoji:'🟡', hex:'#facc15'},
    {id:'white',  name:'White',  emoji:'⚪', hex:'#ffffff'},
    {id:'black',  name:'Black',  emoji:'⚫', hex:'#111827'},
    {id:'pink',   name:'Pink',   emoji:'🌸', hex:'#fb7185'}
  ];

  const RECIPES = [
    {
      name:'Orange',
      hex:'#fb923c',
      needs:['red','yellow'],
      hint:'Red and yellow make orange.'
    },
    {
      name:'Green',
      hex:'#22c55e',
      needs:['blue','yellow'],
      hint:'Blue and yellow make green.'
    },
    {
      name:'Purple',
      hex:'#a855f7',
      needs:['red','blue'],
      hint:'Red and blue make purple.'
    },
    {
      name:'Light Blue',
      hex:'#93c5fd',
      needs:['blue','white'],
      hint:'Blue and white make light blue.'
    },
    {
      name:'Gray',
      hex:'#9ca3af',
      needs:['black','white'],
      hint:'Black and white make gray.'
    },
    {
      name:'Rose Pink',
      hex:'#f472b6',
      needs:['red','pink'],
      hint:'Red and pink make a rosy color.'
    }
  ];

  const STICKER_BANK = ['⭐','🌈','🖌️','🦋','🌟','🎨','🌻','💎','🐱','🚀','🍄','🧁'];

  const STORAGE_KEY = 'palette_quest_v1';

  let selected = [];
  let score = 0;
  let bestScore = 0;
  let stickerCount = 0;
  let currentRecipe = null;

  const palette = document.getElementById('palette');
  const slot1 = document.getElementById('slot1');
  const slot2 = document.getElementById('slot2');
  const message = document.getElementById('message');
  const scoreEl = document.getElementById('score');
  const bestScoreEl = document.getElementById('bestScore');
  const stickersEl = document.getElementById('stickers');
  const targetCircle = document.getElementById('targetCircle');
  const targetName = document.getElementById('targetName');

  function load(){
    try{
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      score = saved.score || 0;
      bestScore = saved.bestScore || 0;
      stickerCount = saved.stickerCount || 0;
    }catch(e){}
  }

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      score,
      bestScore,
      stickerCount
    }));
  }

  function renderPalette(){
    palette.innerHTML = '';
    COLORS.forEach(c=>{
      const btn = document.createElement('button');
      btn.className = 'color-btn';
      btn.dataset.id = c.id;
      btn.style.background = c.hex;
      btn.style.color = (c.id === 'black' || c.id === 'blue' || c.id === 'red') ? '#ffffff' : '#111827';
      btn.innerHTML = `<span>${c.emoji}</span>${c.name}`;
      btn.addEventListener('click',()=>selectColor(c));
      palette.appendChild(btn);
    });
  }

  function selectColor(color){
    if(selected.length >= 2) return;
    selected.push(color);

    if(selected.length === 1){
      slot1.textContent = color.emoji;
      slot1.style.background = color.hex;
    }else{
      slot2.textContent = color.emoji;
      slot2.style.background = color.hex;
    }

    document.querySelectorAll('.color-btn').forEach(btn=>{
      if(selected.some(c=>c.id === btn.dataset.id)){
        btn.classList.add('selected');
      }
    });

    message.textContent = selected.length === 2
      ? 'Ready! Tap Mix!'
      : 'Choose one more color.';
  }

  function clearSelection(){
    selected = [];
    slot1.textContent = '?';
    slot2.textContent = '?';
    slot1.style.background = '#f9fafb';
    slot2.style.background = '#f9fafb';
    document.querySelectorAll('.color-btn').forEach(btn=>btn.classList.remove('selected'));
    message.textContent = 'Pick two colors to begin.';
  }

  function sameRecipe(a,b){
    const chosen = selected.map(c=>c.id).sort().join('+');
    const needed = currentRecipe.needs.slice().sort().join('+');
    return chosen === needed;
  }

  function mix(){
    if(selected.length < 2){
      message.textContent = 'Choose two colors first.';
      return;
    }

    if(sameRecipe()){
      score++;
      if(score > bestScore) bestScore = score;

      message.innerHTML = `Correct! 🎉 ${currentRecipe.hint}`;

      if(score % 3 === 0){
        stickerCount++;
        message.innerHTML += '<br>You unlocked a sticker! ⭐';
      }

      save();
      updateScore();
      renderStickers();

      setTimeout(()=>{
        nextRound();
      },900);
    }else{
      message.innerHTML = `Good try! 💛 Hint: ${currentRecipe.hint}`;
    }
  }

  function nextRound(){
    currentRecipe = RECIPES[Math.floor(Math.random()*RECIPES.length)];
    targetCircle.style.background = currentRecipe.hex;
    targetName.textContent = 'Make ' + currentRecipe.name;
    clearSelection();
    message.textContent = 'New color quest! Choose two colors.';
  }

  function updateScore(){
    scoreEl.textContent = score;
    bestScoreEl.textContent = bestScore;
  }

  function renderStickers(){
    stickersEl.innerHTML = '';
    if(stickerCount === 0){
      stickersEl.innerHTML = '<span style="font-size:12px;color:#6b7280;">No stickers yet. Get 3 correct answers!</span>';
      return;
    }

    for(let i=0;i<stickerCount;i++){
      const s = document.createElement('span');
      s.textContent = STICKER_BANK[i % STICKER_BANK.length];
      stickersEl.appendChild(s);
    }
  }

  document.getElementById('mixBtn').addEventListener('click',mix);
  document.getElementById('clearBtn').addEventListener('click',clearSelection);

  load();
  renderPalette();
  updateScore();
  renderStickers();
  nextRound();
})();
</script>
</body>
</html>
