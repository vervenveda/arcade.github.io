<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🍕 PizzAmoré Deluxe — Brick Oven Edition</title>
<style>
html,body{
  margin:0;padding:0;overflow:hidden;height:100%;
  font-family:"Comic Sans MS",cursive;
  background:url('YOUR_IMAGE_PATH_HERE.webp') no-repeat center center/cover;
  position:relative;
}
body::before{
  /* dark overlay for contrast */
  content:"";
  position:absolute;inset:0;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);
  z-index:0;
}
h1{
  text-align:center;
  font-size:96px;
  color:#fff;
  text-shadow:4px 4px 8px #000;
  margin:10px 0;
  position:relative;
  z-index:2;
}
#gameArea{
  text-align:center;
  position:relative;
  z-index:2;
}
#lampGlow{
  position:absolute;
  top:50%;left:50%;
  width:700px;height:700px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle at 50% 40%, rgba(255,220,150,0.9) 0%, rgba(255,180,90,0.4) 40%, rgba(255,160,60,0) 70%);
  pointer-events:none;
  transition:opacity 1s ease;
  opacity:0.7;
  z-index:1;
}
@keyframes glowPulse{
  0%,100%{opacity:0.8;transform:translate(-50%,-50%) scale(1);}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}
}
canvas{
  background:#fdf6e3;
  border-radius:50%;
  border:14px solid #444;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  margin-top:20px;
}
#controls{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:20px;
}
button,select{
  background:#6cc24a;
  border:none;
  border-radius:20px;
  padding:30px 60px;
  font-size:48px;
  color:#fff;
  box-shadow:4px 4px 8px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:transform .2s;
}
select{appearance:none;}
button:hover,select:hover{transform:scale(1.05);}
#msg{
  font-size:54px;
  color:#fff;
  margin-top:10px;
  text-shadow:2px 2px 4px #000;
}
.sparkle{
  position:absolute;
  width:10px;height:10px;
  background:#ffd93d;
  border-radius:50%;
  animation:sparklePop .7s ease-out forwards;
}
@keyframes sparklePop{
  0%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:translateY(-40px) scale(0);}
}
.steam{
  position:absolute;
  width:12px;height:60px;
  background:rgba(255,255,255,0.8);
  border-radius:50%;
  animation:steamRise 2s linear forwards;
}
@keyframes steamRise{
  0%{opacity:.8;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-120px) scale(.9);}
}
</style>
</head>
<body>
<h1>🍕 PizzAmoré Deluxe</h1>
<div id="gameArea">
  <div id="lampGlow"></div>
  <canvas id="pizzaCanvas" width="600" height="600"></canvas>
  <div id="controls">
    <select id="fractionSelect">
      <option value="2">½ Pizza</option>
      <option value="3">⅓ Pizza</option>
      <option value="4" selected>¼ Pizza</option>
      <option value="5">⅕ Pizza</option>
      <option value="6">⅙ Pizza</option>
      <option value="8">⅛ Pizza</option>
      <option value="10">1⁄10 Pizza</option>
      <option value="12">1⁄12 Pizza</option>
      <option value="16">1⁄16 Pizza</option>
    </select>
    <select id="ingredientSelect">
      <option value="sauce">🫕 Sauce</option>
      <option value="cheese">🧀 Cheese</option>
      <option value="pepperoni">🍖 Pepperoni</option>
      <option value="mushroom">🍄 Mushroom</option>
      <option value="pepper">🌶️ Green Pepper</option>
      <option value="onion">🧅 Onion</option>
      <option value="olive">🫒 Olive</option>
    </select>
    <button id="add">+ Add</button>
    <button id="bake">🔥 Bake</button>
    <button id="reset">🧽 Reset</button>
  </div>
  <div id="msg">Benvenuto, Chef! Start with sauce and learn fractions!</div>
</div>

<audio id="music" loop autoplay>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_60be20b0c5.mp3?filename=accordion-italian-10754.mp3" type="audio/mpeg">
</audio>
<audio id="crackle" loop>
  <source src="https://cdn.pixabay.com/download/audio/2021/10/13/audio_d7c2c85e5f.mp3?filename=fireplace-crackle-ambient-11072.mp3" type="audio/mpeg">
</audio>
<audio id="ding">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_20b8b556e5.mp3?filename=oven-timer-ding-1-10749.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById('pizzaCanvas');
const ctx=canvas.getContext('2d');
let slices=4;
let toppings=[];
let hasSauce=false,hasCheese=false;
let baking=false;
const lamp=document.getElementById('lampGlow');
const music=document.getElementById('music');
const crackle=document.getElementById('crackle');
const ding=document.getElementById('ding');

function drawPizza(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // crust
  ctx.beginPath();ctx.arc(300,300,280,0,Math.PI*2);
  ctx.fillStyle="#ffcc66";ctx.fill();
  // sauce
  if(hasSauce){ctx.beginPath();ctx.arc(300,300,250,0,Math.PI*2);ctx.fillStyle="#e63946";ctx.fill();}
  // cheese
  if(hasCheese){ctx.beginPath();ctx.arc(300,300,240,0,Math.PI*2);ctx.fillStyle="#ffd93d";ctx.fill();}
  // slice lines
  ctx.strokeStyle="#b0413e";ctx.lineWidth=4;
  for(let i=0;i<slices;i++){
    const a=(Math.PI*2/slices)*i;
    ctx.beginPath();ctx.moveTo(300,300);
    ctx.lineTo(300+240*Math.cos(a),300+240*Math.sin(a));
    ctx.stroke();
  }
  ctx.fillStyle="#b0413e";
  ctx.font="bold 60px Comic Sans MS";
  ctx.fillText("1⁄"+slices,250,320);
  // toppings
  toppings.forEach(t=>{
    ctx.beginPath();
    ctx.arc(t.x,t.y,t.size,0,Math.PI*2);
    ctx.fillStyle=t.color;ctx.fill();
  });
}

function sparkle(x,y){
  const s=document.createElement('div');
  s.className='sparkle';
  s.style.left=(canvas.offsetLeft+x)+'px';
  s.style.top=(canvas.offsetTop+y)+'px';
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),700);
}

function addIngredient(type){
  if(type==="sauce"){hasSauce=true;message("Sauce added! Nice swirl!");}
  else if(type==="cheese"){if(!hasSauce)return message("Add sauce first!");hasCheese=true;message("Cheese melting... delizioso!");}
  else{
    if(!hasCheese)return message("Add cheese before toppings!");
    const tData={
      pepperoni:{color:"#d62828",size:15},
      mushroom:{color:"#c8a27e",size:14},
      pepper:{color:"#6cc24a",size:10},
      onion:{color:"#b57edc",size:12},
      olive:{color:"#000000",size:9}
    }[type];
    const a=Math.random()*Math.PI*2;
    const r=90+Math.random()*130;
    const x=300+Math.cos(a)*r;
    const y=300+Math.sin(a)*r;
    toppings.push({x,y,...tData});
    sparkle(x+canvas.offsetLeft,y+canvas.offsetTop);
    message("Added "+type+"!");
  }
  drawPizza();
}

function bakePizza(){
  if(baking)return;
  if(!hasSauce||!hasCheese)return message("Finish your pizza before baking!");
  baking=true;
  lamp.style.animation="glowPulse 2s infinite";
  music.volume=0.3;
  crackle.volume=0.7;crackle.play();
  let count=0;
  message("Baking... count to 10 with me!");
  const timer=setInterval(()=>{
    count++;
    message("⏱️ "+count+" seconds...");
    if(count===3){showSteam();}
    if(count>=10){
      clearInterval(timer);
      lamp.style.animation="none";
      lamp.style.opacity=0.7;
      crackle.pause();ding.play();
      message("Ding! Pizza’s ready! Buon appetito!");
      baking=false;
      music.volume=1.0;
    }
  },1000);
}

function showSteam(){
  for(let i=0;i<15;i++){
    const st=document.createElement('div');
    st.className='steam';
    st.style.left=(canvas.offsetLeft+280+Math.random()*40)+'px';
    st.style.top=(canvas.offsetTop+100)+'px';
    document.body.appendChild(st);
    setTimeout(()=>st.remove(),2000);
  }
}

function message(t){document.getElementById('msg').textContent=t;}

document.getElementById('fractionSelect').onchange=e=>{
  slices=parseInt(e.target.value);
  drawPizza();
  message("Divided into "+slices+" equal parts (1⁄"+slices+")!");
};
document.getElementById('add').onclick=()=>{
  const type=document.getElementById('ingredientSelect').value;
  addIngredient(type);
};
document.getElementById('bake').onclick=bakePizza;
document.getElementById('reset').onclick=()=>{
  toppings=[];hasSauce=false;hasCheese=false;baking=false;
  crackle.pause();music.volume=1.0;drawPizza();
  message("Pizza reset! Start fresh, Chef!");
};

drawPizza();
</script>
</body>
</html>
