<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ESL Mini Quiz → Khaemenes Academy</title>
<style>
  :root{
    --bg1:#0b1020;
    --bg2:#101b3a;
    --card:rgba(255,255,255,0.08);
    --text:#eef2ff;
    --muted:rgba(238,242,255,0.72);
    --accent:#7dd3fc;
    --accent2:#a78bfa;
    --good:#86efac;
    --bad:#fb7185;
    --warn:#fbbf24;
    --radius:18px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--text);
    background:radial-gradient(circle at 15% 0%, rgba(167,139,250,0.22), transparent 42%),
               radial-gradient(circle at 85% 10%, rgba(125,211,252,0.22), transparent 45%),
               linear-gradient(180deg, var(--bg1), var(--bg2));
    padding:14px;
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
    background:linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.05));
    border:1px solid rgba(255,255,255,0.14);
    border-radius:var(--radius);
    box-shadow:0 18px 55px rgba(0,0,0,0.45);
    overflow:hidden;
  }
  header{
    padding:16px;
    background:rgba(0,0,0,0.20);
    border-bottom:1px solid rgba(255,255,255,0.10);
    display:flex;
    gap:14px;
    align-items:flex-start;
    justify-content:space-between;
    flex-wrap:wrap;
  }
  h1{margin:0;font-size:28px;letter-spacing:0.01em}
  .sub{margin-top:6px;color:var(--muted);font-size:18px;line-height:1.35;max-width:720px}
  .rightStack{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
  .pill{
    padding:10px 12px;
    border-radius:999px;
    border:1px solid rgba(125,211,252,0.30);
    background:rgba(125,211,252,0.10);
    font-weight:800;
    font-size:16px;
    white-space:nowrap;
  }
  select{
    font:inherit;
    padding:10px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.06);
    color:var(--text);
    cursor:pointer;
    font-size:16px;
  }
  .content{padding:16px}
  .topbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .stats{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    color:var(--muted);
    font-size:18px;
  }
  .stat{
    padding:10px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.16);
  }
  .btnrow{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end;}
  .btn{
    border:none;
    cursor:pointer;
    border-radius:999px;
    padding:12px 16px;
    font-weight:900;
    font-size:18px;
    color:var(--text);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
    box-shadow:0 10px 22px rgba(0,0,0,0.25);
    transition:transform .05s, background .15s;
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
  }
  .btn:hover{background:rgba(255,255,255,0.12)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{
    background:linear-gradient(90deg, rgba(125,211,252,0.95), rgba(167,139,250,0.95));
    color:#071024;
    border:none;
  }
  .btn.good{border-color:rgba(134,239,172,0.35); background:rgba(134,239,172,0.12)}
  .btn.warn{border-color:rgba(251,191,36,0.35); background:rgba(251,191,36,0.10)}
  .card{
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.16);
    padding:14px;
  }
  .qtitle{font-size:22px;font-weight:950;margin:0 0 8px 0}
  .qtext{font-size:20px;margin:0 0 12px 0;line-height:1.35}
  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  @media(max-width:720px){ .choices{grid-template-columns:1fr} }
  .choice{
    text-align:left;
    border-radius:14px;
    padding:12px 12px;
    font-size:20px;
    font-weight:850;
    color:var(--text);
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    cursor:pointer;
    transition:transform .05s, background .15s, border-color .15s;
  }
  .choice:hover{background:rgba(255,255,255,0.10)}
  .choice:active{transform:translateY(1px)}
  .choice.correct{background:rgba(134,239,172,0.16); border-color:rgba(134,239,172,0.40)}
  .choice.incorrect{background:rgba(251,113,133,0.14); border-color:rgba(251,113,133,0.40)}
  .feedback{
    margin-top:10px;
    font-size:18px;
    color:var(--muted);
    line-height:1.35;
    min-height:26px;
  }
  .progress{
    margin-top:12px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
  }
  .bar{
    flex:1;
    min-width:220px;
    height:14px;
    border-radius:999px;
    background:rgba(255,255,255,0.10);
    border:1px solid rgba(255,255,255,0.10);
    overflow:hidden;
  }
  .bar > div{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, rgba(125,211,252,0.95), rgba(167,139,250,0.95));
  }
  footer{
    padding:14px 16px;
    border-top:1px solid rgba(255,255,255,0.10);
    background:rgba(0,0,0,0.14);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    color:rgba(238,242,255,0.58);
    font-size:16px;
  }
</style>
</head>
<body>
  <div class="wrap" role="main">
    <header>
      <div>
        <h1 id="uiTitle">✨ ESL Mini Quiz</h1>
        <div class="sub" id="uiSub">A quick, friendly check-in (10 questions). Finish to unlock the full ESL portal.</div>
      </div>
      <div class="rightStack">
        <select id="langSelect" aria-label="Language">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
          <option value="ar">العربية</option>
        </select>
        <div class="pill" id="uiPill">All local • no sign-in</div>
      </div>
    </header>

    <div class="content">
      <div class="topbar">
        <div class="stats">
          <div class="stat" id="statScore">Score: 0/0</div>
          <div class="stat" id="statBest">Best: 0/10</div>
          <div class="stat" id="statAttempts">Attempts: 0</div>
        </div>
        <div class="btnrow">
          <a class="btn primary" id="openBtn" href="https://www.khaemenesacademy.org/esl" target="_blank" rel="noopener">🌿 Open ESL Course</a>
          <button class="btn warn" id="restartBtn">Restart</button>
        </div>
      </div>

      <div class="card" id="quizCard">
        <div class="qtitle" id="qTitle">Ready?</div>
        <div class="qtext" id="qText">Press Start to begin your mini quiz.</div>

        <div class="choices" id="choices"></div>

        <div class="feedback" id="feedback"></div>

        <div class="progress">
          <div class="bar" aria-label="Progress"><div id="barFill"></div></div>
          <button class="btn good" id="startNextBtn">Start</button>
        </div>
      </div>
    </div>

    <footer>
      <div id="uiFooterLeft">Khaemenes Academy • ESL funnel quiz • Home-page friendly</div>
      <div id="saveNote"></div>
    </footer>
  </div>

<script>
(() => {
  const ESL_URL = "https://www.khaemenesacademy.org/esl";
  const LS_KEY = "kha_esl_miniquiz_lang_v1";

  // UI translations (questions remain English)
  const I18N = {
    en:{
      title:"✨ ESL Mini Quiz",
      sub:"A quick, friendly check-in (10 questions). Finish to unlock the full ESL portal.",
      pill:"All local • no sign-in",
      score:(s,t)=>`Score: ${s}/${t}`,
      best:(b)=>`Best: ${b}/10`,
      attempts:(a)=>`Attempts: ${a}`,
      open:"🌿 Open ESL Course",
      restart:"Restart",
      ready:"Ready?",
      pressStart:"Press Start to begin your mini quiz.",
      start:"Start",
      next:"Next",
      finish:"Finish",
      finished:"Finished!",
      yourScore:(s)=>`Your score: ${s}/10`,
      correct:"✅ Correct.",
      notQuite:"❌ Not quite.",
      tip:"Tip: Take a new quiz weekly to watch your progress grow.",
      enter:"🌿 Enter the ESL Course",
      tryAnother:"Try Another Quiz",
      footer:"Khaemenes Academy • ESL funnel quiz • Home-page friendly",
      speakHint:"(Questions stay in English for practice.)",
      msgExcellent:"Excellent! You’re ready for the full ESL course.",
      msgNice:"Nice work. The full course will sharpen your reading, grammar, and confidence.",
      msgStart:"Great start. The full ESL course begins gently and builds step-by-step."
    },
    es:{
      title:"✨ Mini Quiz de ESL",
      sub:"Una revisión rápida (10 preguntas). Termina para abrir el portal completo de ESL.",
      pill:"Todo local • sin registro",
      score:(s,t)=>`Puntuación: ${s}/${t}`,
      best:(b)=>`Mejor: ${b}/10`,
      attempts:(a)=>`Intentos: ${a}`,
      open:"🌿 Abrir curso de ESL",
      restart:"Reiniciar",
      ready:"¿Listo/a?",
      pressStart:"Pulsa Iniciar para comenzar el mini quiz.",
      start:"Iniciar",
      next:"Siguiente",
      finish:"Finalizar",
      finished:"¡Terminado!",
      yourScore:(s)=>`Tu puntuación: ${s}/10`,
      correct:"✅ Correcto.",
      notQuite:"❌ No exactamente.",
      tip:"Consejo: haz un nuevo quiz cada semana para ver tu progreso.",
      enter:"🌿 Entrar al curso de ESL",
      tryAnother:"Probar otro quiz",
      footer:"Khaemenes Academy • Mini quiz • Ideal para la página principal",
      speakHint:"(Las preguntas siguen en inglés para practicar.)",
      msgExcellent:"¡Excelente! Estás listo/a para el curso completo.",
      msgNice:"Muy bien. El curso completo mejorará lectura, gramática y confianza.",
      msgStart:"Buen comienzo. El curso completo avanza paso a paso."
    },
    ru:{
      title:"✨ Мини-викторина ESL",
      sub:"Быстрая проверка (10 вопросов). Завершите, чтобы открыть полный курс ESL.",
      pill:"Всё локально • без входа",
      score:(s,t)=>`Счёт: ${s}/${t}`,
      best:(b)=>`Лучший: ${b}/10`,
      attempts:(a)=>`Попытки: ${a}`,
      open:"🌿 Открыть курс ESL",
      restart:"Сброс",
      ready:"Готовы?",
      pressStart:"Нажмите «Старт», чтобы начать викторину.",
      start:"Старт",
      next:"Далее",
      finish:"Завершить",
      finished:"Готово!",
      yourScore:(s)=>`Ваш результат: ${s}/10`,
      correct:"✅ Верно.",
      notQuite:"❌ Не совсем.",
      tip:"Совет: проходите викторину раз в неделю и следите за ростом.",
      enter:"🌿 Перейти к курсу ESL",
      tryAnother:"Ещё викторина",
      footer:"Khaemenes Academy • Мини-викторина • Для главной страницы",
      speakHint:"(Вопросы остаются на английском для практики.)",
      msgExcellent:"Отлично! Вы готовы к полному курсу ESL.",
      msgNice:"Хорошо! Полный курс укрепит чтение, грамматику и уверенность.",
      msgStart:"Хорошее начало. Полный курс идёт мягко и по шагам."
    },
    ar:{
      title:"✨ اختبار ESL المصغّر",
      sub:"اختبار سريع (10 أسئلة). أنهِه لفتح بوابة ESL الكاملة.",
      pill:"محلي بالكامل • بدون تسجيل",
      score:(s,t)=>`النتيجة: ${s}/${t}`,
      best:(b)=>`الأفضل: ${b}/10`,
      attempts:(a)=>`المحاولات: ${a}`,
      open:"🌿 افتح دورة ESL",
      restart:"إعادة",
      ready:"جاهز/ة؟",
      pressStart:"اضغط «ابدأ» لبدء الاختبار.",
      start:"ابدأ",
      next:"التالي",
      finish:"إنهاء",
      finished:"تم!",
      yourScore:(s)=>`نتيجتك: ${s}/10`,
      correct:"✅ صحيح.",
      notQuite:"❌ ليس تمامًا.",
      tip:"نصيحة: خذ اختبارًا جديدًا كل أسبوع لمتابعة تقدمك.",
      enter:"🌿 ادخل دورة ESL",
      tryAnother:"اختبار آخر",
      footer:"Khaemenes Academy • اختبار مصغّر • مناسب للصفحة الرئيسية",
      speakHint:"(الأسئلة تبقى بالإنجليزية للتدريب.)",
      msgExcellent:"ممتاز! أنت جاهز/ة للدورة الكاملة.",
      msgNice:"عمل رائع! الدورة الكاملة تقوّي القراءة والقواعد والثقة.",
      msgStart:"بداية جميلة. الدورة الكاملة تبدأ بلطف وتبني خطوة بخطوة."
    }
  };

  // Pool of 20, we randomly select 10 each run
  const QUESTION_POOL = [
    {q:"Choose the correct sentence:", opts:["She go to school every day.","She goes to school every day.","She going to school every day."], a:1, why:"For he/she/it in present simple, add -s: goes."},
    {q:"Pick the best word: I ____ coffee in the morning.", opts:["drink","drinks","drinking"], a:0, why:"With “I”, use base verb: drink."},
    {q:"Which is a question?", opts:["You are okay.","Are you okay?","You okay are?"], a:1, why:"Questions often start with an auxiliary verb: Are you…?"},
    {q:"Choose the past tense of 'go':", opts:["goed","went","goes"], a:1, why:"The past of go is irregular: went."},
    {q:"Pick the correct article: ____ apple", opts:["a","an","the"], a:1, why:"Use “an” before vowel sounds."},
    {q:"Choose the plural:", opts:["childs","children","childes"], a:1, why:"Child → children (irregular plural)."},
    {q:"Which is correct?", opts:["I have 20 years old.","I am 20 years old.","I am 20 years."], a:1, why:"In English you say: I am 20 years old."},
    {q:"Pick the correct preposition: I live ____ Florida.", opts:["in","on","at"], a:0, why:"Use “in” for states/countries: in Florida."},
    {q:"Choose the correct form: He ____ playing.", opts:["is","are","am"], a:0, why:"He + is = He is playing."},
    {q:"Which word is an adjective?", opts:["quickly","beautiful","run"], a:1, why:"Beautiful describes a noun: adjective."},
    {q:"Pick the best word: I need to ____ a doctor.", opts:["see","look","watch"], a:0, why:"You “see” a doctor."},
    {q:"Choose the correct sentence:", opts:["We was happy.","We were happy.","We are happy yesterday."], a:1, why:"Past of “are” with we: were."},
    {q:"Pick the correct contraction: I am", opts:["I’m","Im","Iam"], a:0, why:"I am → I’m"},
    {q:"Which is correct?", opts:["There is many books.","There are many books.","There be many books."], a:1, why:"Plural books → there are."},
    {q:"Pick the best answer: How are you? — ____", opts:["I fine.","I am fine.","I am fining."], a:1, why:"Common response: I am fine."},
    {q:"Choose the correct word order:", opts:["Always I eat breakfast.","I eat breakfast always.","I always eat breakfast."], a:2, why:"Adverb placement: I always eat…"},
    {q:"Pick the correct form: She ____ to music now.", opts:["listens","is listening","listen"], a:1, why:"“Now” → present continuous: is listening."},
    {q:"Choose the correct: ____ you help me?", opts:["Do","Can","Did"], a:1, why:"Polite request: Can you help me?"},
    {q:"Pick the correct preposition: I’m good ____ English.", opts:["at","in","on"], a:0, why:"We say: good at."},
    {q:"Choose the correct: I ____ been here before.", opts:["have","has","having"], a:0, why:"I + have: I have been…"},
  ];

  const el = (id) => document.getElementById(id);
  const uiTitle = el("uiTitle");
  const uiSub = el("uiSub");
  const uiPill = el("uiPill");
  const uiFooterLeft = el("uiFooterLeft");

  const qTitle = el("qTitle");
  const qText = el("qText");
  const choicesEl = el("choices");
  const feedbackEl = el("feedback");
  const barFill = el("barFill");
  const startNextBtn = el("startNextBtn");
  const restartBtn = el("restartBtn");
  const openBtn = el("openBtn");

  const statScore = el("statScore");
  const statBest = el("statBest");
  const statAttempts = el("statAttempts");
  const saveNote = el("saveNote");
  const langSelect = el("langSelect");

  let state = loadState() || { best:0, attempts:0, lang:"en" };
  let quiz = [];
  let idx = -1;
  let score = 0;
  let locked = false;

  function loadState(){
    try{ return JSON.parse(localStorage.getItem(LS_KEY) || "null"); }catch(e){ return null; }
  }
  function saveState(){
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    saveNote.textContent = state.lang === "ar" ? "تم الحفظ محليًا ✓" : "Saved locally ✓";
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function t(){ return I18N[state.lang] || I18N.en; }

  function applyLang(){
    const L = t();
    uiTitle.textContent = L.title;
    uiSub.textContent = L.sub + " " + L.speakHint;
    uiPill.textContent = L.pill;
    uiFooterLeft.textContent = L.footer;

    openBtn.textContent = L.open;
    restartBtn.textContent = L.restart;

    // RTL for Arabic (UI only)
    const rtl = state.lang === "ar";
    document.documentElement.dir = rtl ? "rtl" : "ltr";
    document.body.style.textAlign = rtl ? "right" : "left";
  }

  function newQuiz(){
    quiz = shuffle(QUESTION_POOL).slice(0,10);
    idx = -1;
    score = 0;
    locked = false;
    feedbackEl.textContent = "";
    choicesEl.innerHTML = "";
    qTitle.textContent = t().ready;
    qText.textContent = t().pressStart;
    startNextBtn.textContent = t().start;
    openBtn.href = ESL_URL;
    updateStats();
    updateBar();
  }

  function updateStats(){
    const L = t();
    statScore.textContent = L.score(score, Math.max(idx+1,0));
    statBest.textContent = L.best(state.best || 0);
    statAttempts.textContent = L.attempts(state.attempts || 0);
  }

  function updateBar(){
    const p = Math.max(0, Math.min(1, (idx+1)/10));
    barFill.style.width = (p*100).toFixed(0) + "%";
  }

  function renderQuestion(){
    locked = false;
    feedbackEl.textContent = "";
    const q = quiz[idx];
    qTitle.textContent = `Q${idx+1}/10`;
    qText.textContent = q.q;
    choicesEl.innerHTML = "";

    q.opts.forEach((opt, i) => {
      const b = document.createElement("button");
      b.className = "choice";
      b.type = "button";
      b.textContent = opt;
      b.addEventListener("click", () => pick(i, b));
      choicesEl.appendChild(b);
    });

    startNextBtn.textContent = (idx === 9) ? t().finish : t().next;
    updateStats();
    updateBar();
  }

  function pick(i){
    if(locked) return;
    locked = true;

    const q = quiz[idx];
    const buttons = Array.from(choicesEl.querySelectorAll(".choice"));
    buttons.forEach((b, bi) => {
      if(bi === q.a) b.classList.add("correct");
      if(bi === i && i !== q.a) b.classList.add("incorrect");
      b.disabled = true;
      b.style.cursor = "default";
    });

    const L = t();
    if(i === q.a){
      score++;
      feedbackEl.innerHTML = `${L.correct} <span style="color:rgba(238,242,255,0.72)">${escapeHtml(q.why)}</span>`;
    } else {
      feedbackEl.innerHTML = `${L.notQuite} <span style="color:rgba(238,242,255,0.72)">${escapeHtml(q.why)}</span>`;
    }
    updateStats();
  }

  function finish(){
    const L = t();
    state.attempts = (state.attempts || 0) + 1;
    if(score > (state.best || 0)) state.best = score;
    saveState();
    updateStats();
    updateBar();

    const msg = score >= 8 ? L.msgExcellent : score >= 5 ? L.msgNice : L.msgStart;

    qTitle.textContent = L.finished;
    qText.textContent = `${L.yourScore(score)} — ${msg}`;
    choicesEl.innerHTML = `
      <a class="btn primary" href="${ESL_URL}" target="_blank" rel="noopener" style="justify-content:center;width:100%">
        ${escapeHtml(L.enter)}
      </a>
      <button class="btn" id="againBtn" style="justify-content:center;width:100%">${escapeHtml(L.tryAnother)}</button>
    `;
    feedbackEl.textContent = L.tip;
    startNextBtn.textContent = "✓";

    document.getElementById("againBtn").addEventListener("click", () => newQuiz());
  }

  function next(){
    if(idx < 0){ idx = 0; renderQuestion(); return; }
    if(idx === 9){ finish(); return; }
    idx++; renderQuestion();
  }

  startNextBtn.addEventListener("click", () => next());
  restartBtn.addEventListener("click", () => newQuiz());

  langSelect.addEventListener("change", ()=>{
    state.lang = langSelect.value;
    saveState();
    applyLang();
    // refresh UI strings without resetting progress
    if(idx < 0){
      qTitle.textContent = t().ready;
      qText.textContent = t().pressStart;
      startNextBtn.textContent = t().start;
    } else if(idx <= 9){
      startNextBtn.textContent = (idx === 9) ? t().finish : t().next;
      updateStats();
    }
  });

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  // init
  langSelect.value = state.lang || "en";
  applyLang();
  newQuiz();
})();
</script>
</body>
</html>
