<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Checkers Variant Lab — 2P or vs AI (Learning)</title>
<style>
  :root{
    --bg:#f7f7fb; --card:#ffffff; --ink:#1f2937; --muted:#6b7280;
    --accent:#2563eb; --win:#16a34a; --lose:#b91c1c;
    --dark:#3b455a; --light:#e6ecf5; --red:#d64545; --crown:#f5d565; --hl:#60a5fa;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;padding:18px
  }
  h1{margin:.2rem 0 .6rem}
  .app{
    background:var(--card); width:min(1100px,95vw);
    border-radius:16px; box-shadow:0 10px 28px rgba(0,0,0,.08); padding:14px
  }
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .pill{
    padding:8px 12px; border-radius:999px; border:1px solid #e5e7eb;
    background:#fff; cursor:pointer
  }
  select{
    border:1px solid #e5e7eb; background:#fff;
    padding:6px 10px; border-radius:10px; font-size:.95rem
  }
  label{font-size:.92rem; color:var(--muted)}
  .boardWrap{display:flex; gap:14px; align-items:flex-start}
  .side{flex:0 0 300px; width:300px; min-width:300px}
  .card{
    background:#fff; border:1px solid #e5e7eb;
    border-radius:12px; padding:10px
  }
  .label{font-size:.9rem; color:var(--muted); margin-bottom:6px}
  .msg{margin-top:6px; font-size:.98rem}
  .msg.win{color:var(--win)} .msg.lose{color:var(--lose)}
  .progress{height:8px; background:#eef2ff; border-radius:999px; overflow:hidden}
  .progress>span{display:block; height:100%; width:0%; background:#60a5fa}

  /* Board: stable sizing; never shrinks due to log */
  .board{
    width:var(--boardSize,560px);
    height:var(--boardSize,560px);
    display:grid;
    grid-template-columns:repeat(var(--N,8),1fr);
    border-radius:12px; overflow:hidden;
    box-shadow:0 8px 18px rgba(0,0,0,.08);
    position:relative; box-sizing:border-box;
    contain:size layout paint;
    flex:0 0 auto;
  }
  .sq{position:relative; user-select:none}
  .sq.light{background:var(--light)}
  .sq.dark{background:var(--dark)}
  .sq.hl{outline:3px solid var(--hl); outline-offset:-3px}
  .sq.hl-move{box-shadow:inset 0 0 0 3px var(--hl)}
  .badge{
    position:absolute; top:6px; right:6px; font-size:.8rem;
    background:#fff; border:1px solid #c7d2fe; color:#1e40af;
    padding:.05rem .4rem; border-radius:999px
  }
  .ray{position:absolute; inset:0; pointer-events:none}
  .ray canvas{position:absolute; inset:0; width:100%; height:100%}

  /* Pieces: high-contrast black + bright reds */
  .piece{
    position:absolute; inset:8%;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:800;
    box-shadow:
      0 0 0 1px rgba(0,0,0,.25),
      inset 0 2px 10px rgba(255,255,255,.35),
      inset 0 -4px 10px rgba(0,0,0,.35)
  }
  .redp{
    background:radial-gradient(circle at 30% 20%,#ffe0e0,#e35b5b 45%,#b73131 85%);
    color:#fff; border:2px solid #6b1212
  }
  .blkp{
    background:radial-gradient(circle at 30% 20%,#e5e7eb,#5a5a5a 45%,#111827 85%);
    color:#fff; border:2px solid #111;
    box-shadow:
      0 0 0 2px #ffffffcc,
      inset 0 2px 10px rgba(255,255,255,.25),
      inset 0 -4px 10px rgba(0,0,0,.4)
  }
  .king::after{
    content:"K"; font-size:1.05rem; color:#2b2314;
    background:var(--crown);
    padding:.08rem .45rem; border-radius:999px;
    border:1px solid #c9a848; transform:translateY(-1px)
  }
  .legend{display:flex; gap:10px; font-size:.9rem; color:#6b7280}
  .dot{width:14px; height:14px; border-radius:999px; display:inline-block; margin-right:6px}
  .dot.red{background:#e35b5b} .dot.blk{background:#444}
  .small{font-size:.86rem; color:#6b7280}
  .log{
    font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size:.9rem;
    height:200px;
    overflow-y:auto; overflow-x:hidden;
    white-space:pre-wrap; word-break:break-word;
    scrollbar-gutter:stable;
    border:1px solid #e5e7eb; border-radius:10px;
    padding:6px; background:#fff
  }

  @media (max-width:820px){
    .boardWrap{flex-direction:column; align-items:center}
    .side{width:100%; min-width:0; flex:1 1 auto}
  }
</style>
</head>
<body>
<h1>Checkers Variant Lab</h1>

<div class="app" id="app">
  <div class="row" style="justify-content:space-between">
    <div class="row">
      <label>Preset</label>
      <select id="preset">
        <option value="american">American</option>
        <option value="international">International</option>
        <option value="russian">Russian</option>
        <option value="giveaway">Giveaway (Suicide)</option>
      </select>

      <label>Board</label>
      <select id="size">
        <option value="8" selected>8×8</option>
        <option value="10">10×10</option>
      </select>

      <label>Mode</label>
      <select id="mode">
        <option value="2p">Two Players (local)</option>
        <option value="ai" selected>Vs AI</option>
      </select>

      <label>Human</label>
      <select id="human">
        <option value="red" selected>Red (moves up)</option>
        <option value="black">Black (moves down)</option>
      </select>

      <label>AI depth</label>
      <select id="depth">
        <option selected>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
      </select>

      <label>Learn rate</label>
      <select id="lr">
        <option value="0.05">0.05</option>
        <option value="0.1">0.10</option>
        <option value="0.2" selected>0.20</option>
      </select>
    </div>

    <div class="row">
      <button id="new" class="pill">New game</button>
      <button id="reset" class="pill">Reset board</button>
      <button id="undo" class="pill">Undo</button>
      <button id="try" class="pill">Try best line</button>
      <button id="clearLearn" class="pill">Clear Learning</button>
      <span class="small" id="learnCount">(0 learned positions)</span>
    </div>
  </div>

  <div class="row" style="margin-top:8px">
    <label>Hints</label>
    <select id="hints">
      <option value="on" selected>On</option>
      <option value="off">Off</option>
    </select>

    <label>Capture</label>
    <select id="capture">
      <option value="mandatory" selected>Mandatory</option>
      <option value="optional">Optional</option>
    </select>

    <label>Majority-capture</label>
    <select id="majority">
      <option value="off">Off</option>
      <option value="on">On</option>
    </select>

    <label>Men capture backward</label>
    <select id="menBack">
      <option value="off">Off</option>
      <option value="on">On</option>
    </select>

    <label>Flying kings</label>
    <select id="flying">
      <option value="off">Off</option>
      <option value="on">On</option>
    </select>

    <label>Continue after crowning</label>
    <select id="continue">
      <option value="off">Off</option>
      <option value="on">On</option>
    </select>
  </div>

  <div class="boardWrap">
    <div id="board" class="board" aria-label="checkers board"></div>
    <aside class="side">
      <div class="card">
        <div class="label">Status</div>
        <div id="status">Turn: <span class="red" style="color:var(--red);font-weight:700">Red</span></div>
        <div class="legend" style="margin-top:6px">
          <span><span class="dot red"></span>Red</span>
          <span><span class="dot blk"></span>Black</span>
        </div>
        <div id="hint" class="small" style="margin-top:6px"></div>
        <div id="msg" class="msg"></div>
        <div style="margin-top:10px">
          <div class="label">AI Thinking</div>
          <div class="progress"><span id="aiBar"></span></div>
        </div>
      </div>

      <div class="card" style="margin-top:10px">
        <div class="label">Move log</div>
        <div id="log" class="log"></div>
      </div>
      <div class="small" style="margin-top:6px;color:var(--muted)">
        Heuristic + Learned value guide the AI. Learning persists locally.
      </div>
    </aside>
  </div>
</div>

<script>
/* ================================
   Constants & helpers
================================ */
const EMPTY=0, RED=1, RED_K=2, BLK=-1, BLK_K=-2;
function isRed(p){return p===RED||p===RED_K}
function isBlk(p){return p===BLK||p===BLK_K}
function isK(p){return p===RED_K||p===BLK_K}

const app = {
  N:8, board:[], turn:RED,
  mode:'ai', human:'red',
  depth:2,             // default to the easiest level now
  lr:0.2,
  hints:'on', captureRule:'mandatory', majority:false, menBack:false, flying:false, continueAfterCrown:false,
  variant:'american', gameOver:false, pendingLearn:[], history:[], log:[]
};
const boardEl = document.getElementById('board');
const statusEl= document.getElementById('status');
const hintEl  = document.getElementById('hint');
const msgEl   = document.getElementById('msg');
const aiBar   = document.getElementById('aiBar');
const logEl   = document.getElementById('log');

/* Stable board sizing */
function setBoardSize(){
  const max = 560, min = 320;
  const wrap = document.querySelector('.boardWrap');
  let avail = wrap ? wrap.clientWidth : window.innerWidth;
  if(!avail || avail < 50) avail = window.innerWidth;
  const column = window.matchMedia('(max-width:820px)').matches;
  const side = column ? 0 : 300;
  const size = Math.max(min, Math.min(max, Math.floor(avail - side - 24)));
  boardEl.style.setProperty('--boardSize', size+'px');
}
window.addEventListener('resize', setBoardSize);

/* Zobrist hashing for learning */
const Z = { table:[], side:0 };
(function initZobrist(){
  const rng = mulberry32(0xC0FFEE);
  function r64(){ return Math.floor(rng()*Number.MAX_SAFE_INTEGER).toString(16)+Math.floor(rng()*Number.MAX_SAFE_INTEGER).toString(16); }
  for(let r=0;r<12;r++){ Z.table[r]=[]; for(let c=0;c<12;c++){ Z.table[r][c]=[r64(),r64(),r64(),r64()]; } }
  Z.side = r64();
})();
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;}}
function xorHex(a,b){const L=Math.max(a.length,b.length),A=a.padStart(L,'0'),B=b.padStart(L,'0');let o='';for(let i=0;i<L;i++)o+=(parseInt(A[i],16)^parseInt(B[i],16)).toString(16);return o;}
function hashBoard(b,side){ let h=''.padStart(24,'0'); for(let r=0;r<app.N;r++) for(let c=0;c<app.N;c++){ const p=b[r][c]; if(p===EMPTY) continue; const idx=p===RED?0:p===RED_K?1:p===BLK?2:3; h=xorHex(h,(Z.table[r]&&Z.table[r][c])?Z.table[r][c][idx]:'1'); } if(side===BLK) h=xorHex(h,Z.side); return h; }

/* Learning table (safe for storage failures) */
const LEARN_KEY='checkers_variant_learning_v1';
let LRN;
try{
  LRN = JSON.parse(localStorage.getItem(LEARN_KEY) || '{}') || {};
}catch(e){
  console.warn('Learning storage unavailable, falling back to in-memory only.', e);
  LRN = {};
}
function learnCount(){return Object.keys(LRN).length}
function saveLearn(){
  try{
    localStorage.setItem(LEARN_KEY,JSON.stringify(LRN));
  }catch(e){
    // storage might be blocked (private mode / iframe); ignore
  }
  document.getElementById('learnCount').textContent=`(${learnCount()} learned positions)`;
}
saveLearn();
function updateLearn(hash,G,lr){
  const e=LRN[hash]||{n:0,v:0};
  e.v=e.v+lr*(G-e.v); e.n++;
  LRN[hash]=e;
}

/* UI helpers */
function setMsg(t,cls=''){ msgEl.textContent=t; msgEl.className='msg'+(cls?(' '+cls):''); }
function progressAI(i,n){ aiBar.style.width = Math.round((i/n)*100)+'%'; }
function pushLog(txt){
  app.log.push(txt);
  if(app.log.length>80) app.log.shift();
  logEl.textContent = app.log.map((t,i)=>String(i+1).padStart(2,'0')+'. '+t).join('\n');
  logEl.scrollTop = logEl.scrollHeight;
}

/* board creation */
function initialBoard(N){
  const b=Array.from({length:N},()=>Array(N).fill(EMPTY));
  const rows = (N===8)?3:4;
  for(let r=0;r<rows;r++) for(let c=0;c<N;c++) if((r+c)%2===1) b[r][c]=BLK;
  for(let r=N-rows;r<N;r++) for(let c=0;c<N;c++) if((r+c)%2===1) b[r][c]=RED;
  return b;
}

/* render */
let legal=[], sel=null, thinking=false, bestPreview=null;
function renderBoard(){
  setBoardSize();
  boardEl.style.setProperty('--N', app.N);
  boardEl.innerHTML='';
  for(let r=0;r<app.N;r++){
    for(let c=0;c<app.N;c++){
      const sq=document.createElement('div');
      sq.className='sq '+(((r+c)%2===0)?'light':'dark');
      sq.dataset.r=r; sq.dataset.c=c;
      boardEl.appendChild(sq);
      const p=app.board[r][c];
      if(p!==EMPTY){
        const d=document.createElement('div');
        d.className='piece '+(isRed(p)?'redp':'blkp')+(isK(p)?' king':'');
        sq.appendChild(d);
      }
    }
  }
  // Hints glow
  const show=app.hints==='on'; const hasJump = legal.some(m=>m.capture);
  if(show){
    if(hasJump && app.captureRule==='mandatory'){
      legal.filter(m=>m.capture).forEach(m=>{
        const idx=m.from.r*app.N+m.from.c;
        boardEl.children[idx].classList.add('hl');
      });
      hintEl.textContent = (app.variant==='giveaway'?'Give away pieces: ':'')+"Capture required.";
    } else if(hasJump && app.captureRule==='optional'){
      hintEl.textContent = "Capture available (optional).";
    } else hintEl.textContent='';
  } else hintEl.textContent='';

  const t = app.turn===RED
    ? '<span class="red" style="color:#d64545;font-weight:700">Red</span>'
    : '<span class="blk" style="font-weight:700">Black</span>';
  statusEl.innerHTML = `Turn: ${t} ${thinking?'<span style="color:var(--muted)">· AI thinking…</span>':''}`;

  // best-line overlay
  if(bestPreview){
    const ray=document.createElement('div'); ray.className='ray';
    const cv=document.createElement('canvas'); ray.appendChild(cv); boardEl.appendChild(ray);
    const rect=boardEl.getBoundingClientRect(); const N=app.N;
    const ctx=cv.getContext('2d'); const s=window.devicePixelRatio||1;
    cv.width = rect.width*s; cv.height=rect.height*s; cv.style.width='100%'; cv.style.height='100%'; ctx.scale(s,s);
    const step=rect.width/N;
    let x0=(bestPreview.from.c+0.5)*step, y0=(bestPreview.from.r+0.5)*step;
    ctx.lineWidth=4; ctx.strokeStyle='rgba(37,99,235,.85)'; ctx.fillStyle='rgba(37,99,235,.85)';
    for(const st of bestPreview.seq){
      const x1=(st.c+0.5)*step, y1=(st.r+0.5)*step;
      ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
      const ang=Math.atan2(y1-y0,x1-x0); const a=14;
      ctx.beginPath(); ctx.moveTo(x1,y1);
      ctx.lineTo(x1-a*Math.cos(ang-0.35), y1-a*Math.sin(ang-0.35));
      ctx.lineTo(x1-a*Math.cos(ang+0.35), y1-a*Math.sin(ang+0.35));
      ctx.closePath(); ctx.fill();
      x0=x1; y0=y1;
    }
  }
}
function rerender(){ updateLegal(); renderBoard(); }

/* controls */
document.getElementById('preset').onchange = e => applyPreset(e.target.value);
document.getElementById('size').onchange   = e => { app.N=+e.target.value; newGame(true); };
document.getElementById('mode').onchange   = e => {
  app.mode=e.target.value;
  document.getElementById('human').disabled=(app.mode==='2p');
  if(app.mode==='ai' && !isHumansTurn() && !app.gameOver) aiMove();
};
document.getElementById('human').onchange  = e => {
  app.human=e.target.value;
  if(app.mode==='ai' && !isHumansTurn() && !app.gameOver) aiMove();
};
document.getElementById('depth').onchange  = e => {
  let d = +e.target.value;
  // 10×10 stays shallower for performance
  if(app.N === 10 && d > 3) d = 3;
  app.depth = d;
  e.target.value = String(d);
};
document.getElementById('lr').onchange     = e => app.lr=+e.target.value;
document.getElementById('hints').onchange  = e => { app.hints=e.target.value; renderBoard(); };
document.getElementById('capture').onchange= e => { app.captureRule=e.target.value; rerender(); };
document.getElementById('majority').onchange= e => { app.majority=(e.target.value==='on'); rerender(); };
document.getElementById('menBack').onchange= e => { app.menBack=(e.target.value==='on'); rerender(); };
document.getElementById('flying').onchange = e => { app.flying=(e.target.value==='on'); rerender(); };
document.getElementById('continue').onchange= e => { app.continueAfterCrown=(e.target.value==='on'); rerender(); };
document.getElementById('new').onclick     = ()=> newGame();
document.getElementById('reset').onclick   = ()=> resetBoard();
document.getElementById('undo').onclick    = ()=> undo();
document.getElementById('try').onclick     = ()=> tryBestLine();
document.getElementById('clearLearn').onclick=()=>{
  if(confirm('Clear learned positions?')){
    LRN={}; saveLearn();
  }
};

/* presets */
function applyPreset(name){
  app.variant = name;
  if(name==='american'){
    app.N=8; setSel('size','8');
    setSel('majority','off'); setSel('menBack','off'); setSel('flying','off'); setSel('continue','off');
    setSel('capture','mandatory');
  }else if(name==='international'){
    app.N=10; setSel('size','10');
    setSel('majority','on'); setSel('menBack','on'); setSel('flying','on'); setSel('continue','on');
    setSel('capture','mandatory');
  }else if(name==='russian'){
    app.N=8; setSel('size','8');
    setSel('majority','on'); setSel('menBack','on'); setSel('flying','on'); setSel('continue','on');
    setSel('capture','mandatory');
  }else if(name==='giveaway'){
    app.N=8; setSel('size','8');
    setSel('majority','off'); setSel('menBack','on'); setSel('flying','off'); setSel('continue','off');
    setSel('capture','mandatory');
  }
  // sync app fields
  app.majority = getSel('majority')==='on';
  app.menBack  = getSel('menBack')==='on';
  app.flying   = getSel('flying')==='on';
  app.continueAfterCrown = getSel('continue')==='on';
  app.captureRule = getSel('capture');
  newGame(true);
}
function setSel(id,val){ const el=document.getElementById(id); el.value=val; }
function getSel(id){ return document.getElementById(id).value; }

/* boot new games */
function newGame(silent=false){
  setBoardSize();
  app.board = initialBoard(app.N);
  app.turn  = RED;
  app.gameOver=false; app.pendingLearn=[]; app.history=[]; app.log=[]; bestPreview=null;
  logEl.textContent=''; setMsg('', ''); aiBar.style.width='0%';
  rerender();
  if(!silent) pushLog('[New game]');
  if(app.mode==='ai' && !isHumansTurn()) aiMove();
}
function resetBoard(){
  app.board = initialBoard(app.N);
  app.turn=RED; app.gameOver=false; app.pendingLearn=[];
  sel=null; app.history=[]; app.log=[]; logEl.textContent='';
  setMsg('',''); aiBar.style.width='0%'; bestPreview=null;
  rerender();
}
applyPreset('american'); // default

/* ================================
   Move generation
================================ */
function clone(b){ return b.map(r=>r.slice()); }
function inB(r,c){ return r>=0 && r<app.N && c>=0 && c<app.N; }
function forwardDirs(p){
  if(isK(p)) return [[-1,-1],[-1,1],[1,-1],[1,1]];
  return isRed(p)?[[-1,-1],[-1,1]]:[[1,-1],[1,1]];
}
function captureDirs(p){
  if(isK(p)) return [[-1,-1],[-1,1],[1,-1],[1,1]];
  if(app.menBack) return [[-1,-1],[-1,1],[1,-1],[1,1]];
  return isRed(p)?[[-1,-1],[-1,1]]:[[1,-1],[1,1]];
}

function generateMoves(board, side){
  const jumps=[], steps=[];
  // collect all jumps
  for(let r=0;r<app.N;r++)for(let c=0;c<app.N;c++){
    const p=board[r][c]; if(p===EMPTY) continue;
    if(side===RED && !isRed(p)) continue;
    if(side===BLK && !isBlk(p)) continue;
    const seqs = findJumps(board,r,c,p);
    seqs.forEach(s=>jumps.push({from:{r,c}, seq:s.path, capture:true, captures:s.captures}));
  }
  if(jumps.length){
    let usable = jumps;
    if(app.majority){
      const mx = Math.max(...jumps.map(m=>m.captures));
      usable = jumps.filter(m=>m.captures===mx);
    }
    if(app.captureRule==='mandatory') return usable;
    usable.forEach(m=>steps.push(m));
  }
  // steps
  for(let r=0;r<app.N;r++)for(let c=0;c<app.N;c++){
    const p=board[r][c]; if(p===EMPTY) continue;
    if(side===RED && !isRed(p)) continue;
    if(side===BLK && !isBlk(p)) continue;
    if(isK(p) && app.flying){
      for(const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]){
        let rr=r+dr, cc=c+dc;
        while(inB(rr,cc) && board[rr][cc]===EMPTY){
          steps.push({from:{r,c}, seq:[{r:rr,c:cc}], capture:false, captures:0});
          rr+=dr; cc+=dc;
        }
      }
    }else{
      for(const [dr,dc] of forwardDirs(p)){
        const rr=r+dr, cc=c+dc;
        if(inB(rr,cc) && board[rr][cc]===EMPTY){
          steps.push({from:{r,c}, seq:[{r:rr,c:cc}], capture:false, captures:0});
        }
      }
    }
  }
  return steps;
}

/* Find all capture sequences from (r,c) */
function findJumps(board, r, c, p){
  const results=[];
  const N=app.N;
  function dfs(brd, rr, cc, piece, path, cap){
    // crowning check
    let becameKing=false;
    if(!isK(piece)){
      if(isRed(piece)&&rr===0){ piece=RED_K; becameKing=true; }
      if(isBlk(piece)&&rr===N-1){ piece=BLK_K; becameKing=true; }
    }
    if(becameKing && !app.continueAfterCrown){
      results.push({path:path.slice(), captures:cap});
      return;
    }

    let extended=false;

    if(isK(piece) && app.flying){
      for(const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]){
        let r1=rr+dr, c1=cc+dc; let oppR=-1, oppC=-1; let sawOpp=false;
        while(inB(r1,c1)){
          if(brd[r1][c1]===EMPTY){ r1+=dr; c1+=dc; continue; }
          if( (isRed(piece) && isRed(brd[r1][c1])) || (isBlk(piece) && isBlk(brd[r1][c1])) ) break;
          sawOpp=true; oppR=r1; oppC=c1; r1+=dr; c1+=dc;
          while(inB(r1,c1) && brd[r1][c1]===EMPTY){
            const nb=clone(brd); nb[rr][cc]=EMPTY; nb[oppR][oppC]=EMPTY; nb[r1][c1]=piece;
            dfs(nb, r1, c1, piece, path.concat([{r:r1,c:c1}]), cap+1);
            extended=true;
            r1+=dr; c1+=dc;
          }
          if(sawOpp) break;
        }
      }
    }else{
      for(const [dr,dc] of captureDirs(piece)){
        const mr=rr+dr, mc=cc+dc, lr=rr+2*dr, lc=cc+2*dc;
        if(!inB(lr,lc) || !inB(mr,mc)) continue;
        const mid=brd[mr][mc];
        if(mid===EMPTY) continue;
        if( (isRed(piece) && isRed(mid)) || (isBlk(piece) && isBlk(mid)) ) continue;
        if(brd[lr][lc]!==EMPTY) continue;

        const nb=clone(brd);
        nb[rr][cc]=EMPTY; nb[mr][mc]=EMPTY; nb[lr][lc]=piece;
        dfs(nb, lr, lc, piece, path.concat([{r:lr,c:lc}]), cap+1);
        extended=true;
      }
    }
    if(!extended && path.length>0) results.push({path:path.slice(), captures:cap});
  }
  dfs(board, r, c, p, [], 0);
  return results;
}

/* apply move */
function applyMove(board, move){
  const b=clone(board);
  const {from, seq, capture} = move;
  let p=b[from.r][from.c];
  b[from.r][from.c]=EMPTY;
  let r=from.r, c=from.c;
  if(capture){
    for(const step of seq){
      const dr=Math.sign(step.r - r), dc=Math.sign(step.c - c);
      let rr=r+dr, cc=c+dc;
      while(rr!==step.r && cc!==step.c){
        if(b[rr][cc]!==EMPTY){ b[rr][cc]=EMPTY; break; }
        rr+=dr; cc+=dc;
      }
      r=step.r; c=step.c;
    }
  }else{
    r=seq[0].r; c=seq[0].c;
  }
  if(isRed(p) && !isK(p) && r===0) p=RED_K;
  if(isBlk(p) && !isK(p) && r===app.N-1) p=BLK_K;
  b[r][c]=p;
  return b;
}

/* move selection UI */
boardEl.addEventListener('click', e=>{
  if(app.gameOver||thinking) return;
  const cell=e.target.closest('.sq'); if(!cell) return;
  const r=+cell.dataset.r, c=+cell.dataset.c, p=app.board[r][c];
  bestPreview=null;

  if(!isHumansTurn()) return;

  if(p!==EMPTY && ((app.turn===RED && isRed(p)) || (app.turn===BLK && isBlk(p)))){
    sel={r,c};
    highlightFor(r,c);
    return;
  }
  if(sel){
    const mv = legal.find(m=>m.from.r===sel.r && m.from.c===sel.c && m.seq[m.seq.length-1].r===r && m.seq[m.seq.length-1].c===c);
    if(mv){
      app.history.push({board:clone(app.board), turn:app.turn, logLen:app.log.length});
      const h=hashBoard(app.board,app.turn); app.pendingLearn.push({h,side:app.turn});
      const san = moveToText(mv);
      app.board = applyMove(app.board, mv);
      pushLog( (app.turn===RED?'R: ':'B: ') + san );
      nextTurnOrEnd();
    }else{
      sel=null; renderBoard();
    }
  }
});
function clearHL(){
  for(const s of boardEl.children){
    s.classList.remove('hl','hl-move');
    const b=s.querySelector('.badge'); if(b) b.remove();
  }
}
function highlightFor(r,c){
  clearHL();
  if(app.hints==='on'){
    const hasJump=legal.some(m=>m.capture);
    if(hasJump){
      legal.filter(m=>m.capture).forEach(m=>{
        boardEl.children[m.from.r*app.N+m.from.c].classList.add('hl');
      });
    }else{
      new Set(legal.map(m=>m.from.r*app.N+m.from.c)).forEach(i=>{
        boardEl.children[i].classList.add('hl-move');
      });
    }
  }
  boardEl.children[r*app.N+c].classList.add('hl');
  legal.filter(m=>m.from.r===r&&m.from.c===c).forEach(m=>{
    const end=m.seq[m.seq.length-1];
    const cell=boardEl.children[end.r*app.N+end.c];
    cell.classList.add('hl');
    if(app.hints==='on' && m.capture && m.captures>=2){
      const badge=document.createElement('div');
      badge.className='badge'; badge.textContent='×'+m.captures;
      cell.appendChild(badge);
    }
  });
}

/* legal updates & flow */
function updateLegal(){ legal = generateMoves(app.board, app.turn); }
function isHumansTurn(){
  if(app.mode==='2p') return true;
  return (app.human==='red' && app.turn===RED) || (app.human==='black' && app.turn===BLK);
}

function nextTurnOrEnd(){
  sel=null;
  const flat=app.board.flat();
  const reds=flat.filter(isRed).length;
  const blks=flat.filter(isBlk).length;
  updateLegal();

  if(app.variant==='giveaway'){
    const hasMoves = legal.length>0;
    if(reds===0 || blks===0 || !hasMoves){
      // In Giveaway, the side who successfully has no moves/pieces wins.
      const winner = app.turn;
      endGame(winner, true);
      return;
    }
  }else{
    if(reds===0 || blks===0 || legal.length===0){
      const winner = (reds>0 && blks===0)?RED : (blks>0 && reds===0)?BLK : -app.turn;
      endGame(winner, false);
      return;
    }
  }

  app.turn = -app.turn;
  rerender();
  if(app.mode==='ai' && !isHumansTurn() && !app.gameOver) aiMove();
}
function endGame(winner, giveaway){
  app.gameOver=true;
  if(winner===RED) setMsg(giveaway?'Red wins (gave away pieces smarter)!':'Red wins!','win');
  else if(winner===BLK) setMsg(giveaway?'Black wins (gave away pieces smarter)!':'Black wins!','win');
  else setMsg('Draw');
  const out = (winner===0)?0 : (winner===RED?1:-1);
  for(const st of app.pendingLearn){
    const G = (st.side===RED ? out : -out);
    updateLearn(st.h,G,app.lr);
  }
  app.pendingLearn=[]; saveLearn();
}

/* Undo */
function undo(){
  if(!app.history.length) return;
  const last=app.history.pop();
  app.board=last.board;
  app.turn=last.turn;
  app.log=app.log.slice(0,last.logLen);
  logEl.textContent=app.log.map((t,i)=>String(i+1)+'. '+t).join('\n');
  setMsg('Undid the last move.');
  aiBar.style.width='0%'; app.gameOver=false; sel=null; bestPreview=null;
  rerender();
}

/* Try best line (preview) */
function tryBestLine(){
  if(app.gameOver) return;
  if(!isHumansTurn()) return;
  const mv = pickBestMove(app.board, app.depth, app.turn);
  if(!mv){ setMsg('No legal moves.'); return; }
  bestPreview = {from:mv.from, seq:mv.seq};
  renderBoard();
}

/* ================================
   AI (minimax + alpha-beta + learning bias)
   with difficulty scaling
================================ */

/* Difficulty profile based on depth:
   depth 2 → very forgiving (low search, random-ish, no learning influence)
   depth 3 → moderate (some noise, partial learning)
   depth 4 → strong
   depth 5 → very strong
*/
function difficultyConfig(){
  const d = app.depth || 2;
  const bigBoard = app.N === 10;
  if(d <= 2){
    return {
      searchDepth: 1,          // only 1 ply lookahead
      sampleTopK: 5,           // choose among top 5 moves
      blunderChance: 0.40,     // 40% chance to NOT take absolute best
      noise: 120,              // add up to ±120 score noise
      learnScale: 0.0          // ignore learned bias → feels more human and fallible
    };
  }else if(d === 3){
    return {
      searchDepth: bigBoard ? 2 : 2,
      sampleTopK: 3,
      blunderChance: 0.25,
      noise: 70,
      learnScale: 0.5
    };
  }else if(d === 4){
    return {
      searchDepth: bigBoard ? 3 : 3,
      sampleTopK: 2,
      blunderChance: 0.10,
      noise: 30,
      learnScale: 0.8
    };
  }else{
    return {
      searchDepth: bigBoard ? 3 : 5,
      sampleTopK: 1,
      blunderChance: 0.0,
      noise: 0,
      learnScale: 1.0
    };
  }
}

function valLearn(b,side){
  const e=LRN[hashBoard(b,side)];
  if(!e) return 0;
  const cfg = difficultyConfig();
  const scale = (cfg.learnScale != null ? cfg.learnScale : 1);
  return e.v*60*scale;
}

function evalBoard(board, side){
  let red=0, blk=0, rm=0, bm=0, center=0;
  const N=app.N;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const p=board[r][c]; if(p===EMPTY) continue;
    const cb=(r>=Math.floor(N/4)&&r<Math.ceil(3*N/4)&&c>=Math.floor(N/4)&&c<Math.ceil(3*N/4))?2:0;
    if(isRed(p)){
      red+=(p===RED?100: (app.flying?220:175)) + (p===RED? (N-1-r)*2:0);
      rm+=forwardDirs(p).reduce((m,[dr,dc])=>m+(inB(r+dr,c+dc)&&board[r+dr][c+dc]===EMPTY?1:0),0);
      center+=cb;
    }else{
      blk+=(p===BLK?100: (app.flying?220:175)) + (p===BLK? r*2:0);
      bm+=forwardDirs(p).reduce((m,[dr,dc])=>m+(inB(r+dr,c+dc)&&board[r+dr][c+dc]===EMPTY?1:0),0);
      center-=cb;
    }
  }
  let score=(red-blk)+(rm-bm)*3+center*2;
  if(app.variant==='giveaway') score = -score;
  return side===RED?score:-score;
}
function orderMoves(mv){
  return mv.slice().sort((a,b)=>{
    if(a.capture!==b.capture) return b.capture - a.capture;
    if(a.capture && b.capture) return (b.captures||0) - (a.captures||0);
    return 0;
  });
}
function search(board, depth, side, alpha, beta){
  const moves=generateMoves(board, side);
  if(depth===0 || moves.length===0) return evalBoard(board, side)+valLearn(board,side);
  const ord=orderMoves(moves);
  let best=-Infinity;
  for(const mv of ord){
    const nb=applyMove(board,mv);
    const v = -search(nb, depth-1, -side, -beta, -alpha);
    if(v>best) best=v;
    if(best>alpha) alpha=best;
    if(alpha>=beta) break;
  }
  return best;
}
function pickBestMove(board, depth, side){
  const moves=generateMoves(board, side); if(!moves.length) return null;
  const ord=orderMoves(moves);
  const cfg = difficultyConfig();
  const effDepth = Math.max(1, cfg.searchDepth || depth || 2);
  const scored = [];
  let i=0;
  for(const mv of ord){
    progressAI(++i, ord.length);
    const nb=applyMove(board,mv);
    const baseScore = -search(nb, effDepth-1, -side, -Infinity, Infinity);
    const noiseMag = cfg.noise || 0;
    const noise = (Math.random()*2-1) * noiseMag; // ±noiseMag
    const score = baseScore + noise;
    scored.push({mv, baseScore, score});
  }
  progressAI(ord.length, ord.length);
  scored.sort((a,b)=> b.score - a.score);

  let choice = scored[0];
  const topK = Math.min(cfg.sampleTopK || 1, scored.length);
  const blunderChance = cfg.blunderChance || 0;

  if(topK > 1){
    if(Math.random() < blunderChance){
      // pick a random move among the topK candidates
      choice = scored[Math.floor(Math.random()*topK)];
    }else{
      choice = scored[0];
    }
  }

  return choice.mv;
}
function aiMove(){
  thinking=true; renderBoard(); setMsg('');
  setTimeout(()=>{
    const mv=pickBestMove(app.board, app.depth, app.turn);
    if(!mv){
      endGame(-app.turn, app.variant==='giveaway');
      thinking=false; renderBoard(); return;
    }
    const h=hashBoard(app.board, app.turn); app.pendingLearn.push({h,side:app.turn});
    const san = moveToText(mv);
    app.board = applyMove(app.board, mv);
    pushLog( (app.turn===RED?'R: ':'B: ') + san + '  (AI)' );
    thinking=false; nextTurnOrEnd();
  }, 10);
}

/* notation */
function moveToText(m){
  const lab = (sq)=> String.fromCharCode(97+sq.c) + (app.N - sq.r);
  return [lab(m.from)].concat(m.seq.map(lab)).join(m.capture?'x':'-');
}

/* Save learning on unload */
window.addEventListener('beforeunload', saveLearn);
</script>
