  }

  .meta {

  button:hover {

    padding: 0.75rem;

    cursor: pointer;
    transition: all 0.3s ease;
    animation: none;
    background-size: auto;
  }

    background: rgba(255,255,255,0.2);
    transform: translateY(-3px);
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
  }

    margin-top: 1rem;

  }

  .score {

    text-align: center;
    font-size: 0.8rem;

/* ==========================
   GAME STATE & HELPERS
   ========================== */

// How many questions per playthrough
const QUESTIONS_PER_GAME = 10;

// Fisher–Yates shuffle
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let currentCategory = [];
let currentQuestion = 0;
let score = 0;

const container = document.getElementById("gameContainer");
const ambient = document.getElementById("ambient");
const chime = document.getElementById("chime");
const brush = document.getElementById("brush");

/* ==========================
   START & QUESTION FLOW
   ========================== */

function startCategory(cat) {
  const pool = categories[cat];
  if (!pool || !pool.length) return;

  // make a shuffled copy of the full pool
  const shuffledPool = shuffle([...pool]);
  // take a random subset for this run
  currentCategory = shuffledPool.slice(
    0,
    Math.min(QUESTIONS_PER_GAME, shuffledPool.length)
  );

  currentQuestion = 0;
  score = 0;
  ambient.volume = 0.3;
  ambient.play().catch(()=>{});
  showQuestion();
}

function showQuestion() {
  const q = currentCategory[currentQuestion];
  if (!q) return;

  // build a shuffled list of option indices [0,1,2,3...]
  const optionIndices = shuffle(q.options.map((_, i) => i));

  container.classList.remove("fade");
  void container.offsetWidth; // restart animation
  container.classList.add("fade");
  brush.currentTime = 0;
  brush.play().catch(()=>{});

  const optionsHtml = optionIndices
    .map(optIndex => `
      <button class="option-btn" onclick="checkAnswer(${optIndex})">
        ${q.options[optIndex]}
      </button>
    `)
    .join('');

  container.innerHTML = `
    <h1>${q.question}</h1>
    <p class="meta">Question ${currentQuestion + 1} of ${currentCategory.length}</p>
    <div class="options">
      ${optionsHtml}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="score">Score: ${score} / ${currentCategory.length}</div>
  `;
}

function checkAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const correctIndex = currentCategory[currentQuestion].answer;

  if (selected === correctIndex) {
    chime.currentTime = 0;
    chime.play().catch(()=>{});
    feedback.textContent = "✅ Correct!";
    feedback.style.color = "#00c9a7";
    score++;
  } else {
    feedback.textContent = "❌ Try Again!";
    feedback.style.color = "#f78da7";
    return; // let them pick again
  }

  currentQuestion++;
  if (currentQuestion < currentCategory.length) {
    setTimeout(showQuestion, 1000);
  } else {
    setTimeout(endGame, 1000);
  }
}

function endGame() {
  ambient.pause();
  const totalScore = parseInt(localStorage.getItem("totalScore") || "0", 10) + score;
  localStorage.setItem("totalScore", totalScore);

  container.innerHTML = `
    <h1>✨ Well Done ✨</h1>
    <p>You scored ${score} / ${currentCategory.length} this round.</p>
    <p>Total Mastery Points: ${totalScore}</p>
    <div class="options">
      <button onclick="goHome()">🏛 Back to Gallery</button>
      <button onclick="replay()">🔁 Play Again</button>
    </div>
  `;
}

function goHome() {
  container.innerHTML = `
    <h1>Sovereign Arts Trivia</h1>
    <p>Choose your creative realm — let sound, color, and memory guide you.</p>
    <div class="options">
      <button onclick="startCategory('artists')">🎨 Famous Artists</button>
      <button onclick="startCategory('therapy')">🌈 Color & Sound Therapy</button>
      <button onclick="startCategory('history')">📜 Art History</button>
      <button onclick="startCategory('techniques')">🖌️ Art Techniques</button>
    </div>
  `;
}

function replay() {
  // Just send them home so they can choose the same or a different realm
  goHome();
}
